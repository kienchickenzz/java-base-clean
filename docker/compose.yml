services:
    db:
        hostname: db
        container_name: postgres_db
        image: postgres:16
        restart: no
        networks:
        - server
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            - "5432:5432"
        volumes:
            - ./volume/postgres:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U root -d db"]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    server:
        driver: bridge
        name: server-network
